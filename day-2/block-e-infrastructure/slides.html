Write down one thing from this morning you want to remember. Then set it aside.</p>

<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="why-infrastructure-matters-for-analytics-managers-12">Why Infrastructure Matters for Analytics Managers (1/2)</h2>
<p>You don't need to be a data engineer — but you need to understand the stack well enough to <strong>make decisions</strong>.</p>
<ul>
<li>Infrastructure choices are <strong>2–3 year commitments</strong></li>
<li>The wrong warehouse, the wrong BI tool, the wrong ingestion pipeline — these compound into <strong>months of lost productivity</strong></li>
<li>Your team's output is only as good as the <strong>data they can access</strong></li>
</ul>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="5" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="why-infrastructure-matters-for-analytics-managers-22">Why Infrastructure Matters for Analytics Managers (2/2)</h2>
<p><strong>The manager's job:</strong> You're not configuring Snowflake. You're deciding <em>whether</em> to use Snowflake, <em>how much</em> to spend on it, and <em>who</em> is responsible when it breaks.</p>
<p>Your analysts can only analyze what they can access. If the infrastructure is broken, their skills don't matter.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="6" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="your-cross-functional-universe">Your Cross-Functional Universe</h2>
<p>Analytics doesn't exist in a vacuum. Your key interfaces:</p>
<table>
<thead>
<tr>
<th>Interface</th>
<th>What they care about</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Product</strong></td>
<td>What to measure, experiment results</td>
</tr>
<tr>
<td><strong>Engineering</strong></td>
<td>How to collect data, system reliability</td>
</tr>
<tr>
<td><strong>Legal / Privacy</strong></td>
<td>What you can store, for how long</td>
</tr>
<tr>
<td><strong>Finance</strong></td>
<td>What it all costs</td>
</tr>
<tr>
<td><strong>IT / Infra</strong></td>
<td>Where it runs, who has access</td>
</tr>
</tbody>
</table>
<p><strong>Mental model:</strong> Analytics sits at the center of a hub-and-spoke. Every spoke is a relationship you must actively manage.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="7" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="the-xfn-failure-modes">The XFN Failure Modes</h2>
<p>What actually goes wrong when cross-functional relationships aren't managed:</p>
<ul>
<li><strong>Engineering changes a schema</strong> and breaks your pipeline at 2 AM. Your morning dashboards are wrong. The CEO asks questions before you know there's a problem.</li>
<li><strong>Legal blocks your new analytics tool</strong> three months into implementation. You've already migrated data and trained the team.</li>
<li><strong>Finance doesn't approve your vendor renewal.</strong> Dashboards go dark.</li>
<li><strong>Product launches a feature without instrumentation.</strong> The VP asks &quot;how is it performing?&quot; and you have no data.</li>
</ul>
<p>Each failure mode maps to a <strong>preventable relationship gap</strong>. That's what SLAs are for.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="8" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="what-each-team-needs--its-bidirectional">What Each Team Needs — It's Bidirectional</h2>
<table>
<thead>
<tr>
<th>Team</th>
<th>They need from you</th>
<th>You need from them</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Product</strong></td>
<td>Metrics definitions, experiment results</td>
<td>Clear, prioritized business questions</td>
</tr>
<tr>
<td><strong>Engineering</strong></td>
<td>Data contracts, schema documentation</td>
<td>Advance notice of schema changes</td>
</tr>
<tr>
<td><strong>Legal</strong></td>
<td>Data inventories, consent tracking</td>
<td>Timely privacy reviews</td>
</tr>
<tr>
<td><strong>Finance</strong></td>
<td>Cost attribution, ROI analysis</td>
<td>Reasonable budget cycles</td>
</tr>
<tr>
<td><strong>IT</strong></td>
<td>Security compliance docs</td>
<td>Procurement timelines, cloud access</td>
</tr>
</tbody>
</table>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="9" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="building-bidirectional-slas--template">Building Bidirectional SLAs — Template</h2>
<p><strong>Template:</strong></p>
<blockquote>
<p><strong>Analytics will</strong> provide [deliverable X] within [Y timeframe].<br />
<strong>[Partner team] will</strong> provide [deliverable Z] within [W timeframe].<br />
<strong>Escalation path:</strong> [name/role] if SLA is missed.<br />
<strong>Review cadence:</strong> Monthly sync to assess and adjust.</p>
</blockquote>
<p>SLAs work when <strong>both sides see value</strong>. If it feels one-sided, it won't survive the first quarter.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="10" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="building-bidirectional-slas--example">Building Bidirectional SLAs — Example</h2>
<p><strong>Analytics <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2194.svg" data-marp-twemoji=""/> Engineering SLA:</strong></p>
<blockquote>
<p>Analytics will review and sign off on schema change impact assessments within <strong>3 business days</strong>.<br />
Engineering will notify analytics <strong>2 sprints before</strong> any schema change to tracked events.<br />
Escalation: VP Engineering and Head of Analytics.<br />
Review: First Monday of each month.</p>
</blockquote>
<p>Both sides get something: Engineering gets fast turnaround on impact assessments, and you get advance notice of changes.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="11" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="the-data-infrastructure-blueprint">The Data Infrastructure Blueprint</h2>
<p>The canonical flow — every modern data stack follows this pattern:</p>
<p><strong>Sources</strong> --&gt; <strong>Ingestion</strong> --&gt; <strong>Storage</strong> --&gt; <strong>Transform</strong> --&gt; <strong>Semantic Layer</strong> --&gt; <strong>Visualization</strong></p>
<p>With cross-cutting concerns at every layer:</p>
<ul>
<li><strong>Governance:</strong> Who owns what? Who can access what?</li>
<li><strong>Observability:</strong> Is it working? How do you know?</li>
<li><strong>Cost management:</strong> What does each layer cost?</li>
</ul>
<p><strong>Anchor this slide.</strong> We'll come back to it throughout the block.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="12" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="reading-an-architecture-diagram">Reading an Architecture Diagram</h2>
<table>
<thead>
<tr>
<th>Layer</th>
<th>What it does (plain English)</th>
<th>Key question</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Sources</strong></td>
<td>Where data originates (app, APIs, files)</td>
<td>&quot;Capturing everything we need?&quot;</td>
</tr>
<tr>
<td><strong>Ingestion</strong></td>
<td>Moves data from sources to storage</td>
<td>&quot;How fresh? Minutes, hours, days?&quot;</td>
</tr>
<tr>
<td><strong>Storage</strong></td>
<td>The central repository (warehouse)</td>
<td>&quot;Cost? Can it scale?&quot;</td>
</tr>
<tr>
<td><strong>Transform</strong></td>
<td>Cleans raw data into usable tables</td>
<td>&quot;How do we verify correctness?&quot;</td>
</tr>
<tr>
<td><strong>Semantic Layer</strong></td>
<td>Defines metrics so everyone agrees</td>
<td>&quot;One definition of 'revenue'?&quot;</td>
</tr>
<tr>
<td><strong>Visualization</strong></td>
<td>Dashboards end users see</td>
<td>&quot;Can stakeholders self-serve?&quot;</td>
</tr>
</tbody>
</table>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="13" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="reading-an-architecture-diagram-cont">Reading an Architecture Diagram (cont.)</h2>
<p><strong>At every layer, ask three questions:</strong></p>
<ol>
<li>&quot;How do we know it's working?&quot; — observability</li>
<li>&quot;What happens when it breaks?&quot; — resilience</li>
<li>&quot;What does it cost?&quot; — cost management</li>
</ol>
<p>If you can ask those three questions intelligently about each layer, you can hold your own in any infrastructure conversation.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="14" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="build-vs-buy--the-framework">Build vs. Buy — The Framework</h2>
<p><strong>Four questions in order:</strong></p>
<ol>
<li>
<p><strong>Is this a core differentiator?</strong> If yes: build.</p>
<ul>
<li>Your recommendation algorithm? Build. Your data warehouse? Buy.</li>
</ul>
</li>
<li>
<p><strong>Is this commodity infrastructure?</strong> If yes: buy.</p>
<ul>
<li>Ingestion, storage, BI tooling — these are solved problems.</li>
</ul>
</li>
<li>
<p><strong>Do you have the team to maintain it?</strong> If no: buy.</p>
<ul>
<li>&quot;Free&quot; open source costs your engineers' time. Forever.</li>
</ul>
</li>
<li>
<p><strong>What's the Total Cost of Ownership?</strong></p>
<ul>
<li>License + implementation + training + maintenance + <strong>opportunity cost</strong></li>
</ul>
</li>
</ol>
<p><strong>Default to buy</strong> for infrastructure. Default to build for business logic.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="15" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="the-hidden-costs-of-free">The Hidden Costs of &quot;Free&quot;</h2>
<p>Open-source tools have <strong>real costs</strong> — your engineers' time.</p>
<p><strong>Airflow (open-source) vs. managed alternatives:</strong></p>
<table>
<thead>
<tr>
<th>Cost component</th>
<th>Self-hosted Airflow</th>
<th>Managed (e.g., Astronomer)</th>
</tr>
</thead>
<tbody>
<tr>
<td>License</td>
<td>$0</td>
<td>~$300–1,200/mo</td>
</tr>
<tr>
<td>Engineer setup</td>
<td>40–80 hours</td>
<td>4–8 hours</td>
</tr>
<tr>
<td>Monthly maintenance</td>
<td>8–16 hours/mo</td>
<td>~0 hours/mo</td>
</tr>
<tr>
<td>Upgrades (annual)</td>
<td>20–40 hours</td>
<td>Included</td>
</tr>
<tr>
<td><strong>Annual engineer cost</strong></td>
<td><strong>~$30K–50K in loaded salary</strong></td>
<td><strong>~$4K–14K in subscription</strong></td>
</tr>
</tbody>
</table>
<p><strong>When &quot;free&quot; actually costs more than &quot;paid&quot;:</strong> almost always, unless you have a dedicated platform team.</p>
<p>The real question: what does your team <strong>not build</strong> while maintaining this tool?</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="16" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="quick-check-build-or-buy">Quick Check: Build or Buy?</h2>
<p><strong>2 minutes — turn to your neighbor:</strong></p>
<p>Think about your case context. Name <strong>one tool or capability</strong> your team needs. Would you build it or buy it? Why?</p>
<p>Apply the four questions. Be ready to share your answer and your reasoning.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="17" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="small-org-stack-0-to-1">Small Org Stack (0 to 1)</h2>
<p><strong>Goal:</strong> Trusted numbers, fast. Don't over-engineer.</p>
<table>
<thead>
<tr>
<th>Layer</th>
<th>Tool</th>
<th>Why</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Sources</strong></td>
<td>Product DB + basic events</td>
<td>Start with what you have</td>
</tr>
<tr>
<td><strong>Ingestion</strong></td>
<td>Fivetran or Airbyte</td>
<td>Managed connectors; don't build this</td>
</tr>
<tr>
<td><strong>Storage</strong></td>
<td>BigQuery or Snowflake (free tier)</td>
<td>Start small, scale later</td>
</tr>
<tr>
<td><strong>Transform</strong></td>
<td>dbt (Core or Cloud)</td>
<td>SQL-based; version-controlled; testable</td>
</tr>
<tr>
<td><strong>Viz</strong></td>
<td>Metabase or Preset</td>
<td>Open-source options exist; low cost</td>
</tr>
<tr>
<td><strong>Governance</strong></td>
<td>Naming conventions + a spreadsheet</td>
<td>Seriously. This is enough to start.</td>
</tr>
</tbody>
</table>
<p><strong>Monthly cost:</strong> $500–2,000</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="18" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="small-org-stack--what-to-skip">Small Org Stack — What to Skip</h2>
<p><strong>Skip:</strong> Data catalog, ML platform, feature store, semantic layer tooling. You're not there yet.</p>
<p>Resist the urge to build for scale you don't have. Every tool you add is a tool you have to maintain.</p>
<p>At this stage, your most scarce resource is <strong>people's time</strong>, not compute capacity. Add complexity when you feel <strong>real pain</strong> — not anticipated pain.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="19" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="medium-org-stack-1-to-n">Medium Org Stack (1 to N)</h2>
<p><strong>Goal:</strong> Self-serve metrics, experimentation, data trust at scale.</p>
<p>Add to the small stack:</p>
<table>
<thead>
<tr>
<th>Layer</th>
<th>Addition</th>
<th>Why now</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Event platform</strong></td>
<td>Segment or RudderStack</td>
<td>Structured event collection; identity resolution</td>
</tr>
<tr>
<td><strong>Experimentation</strong></td>
<td>Statsig or Eppo</td>
<td>Rigorous A/B testing, not spreadsheet math</td>
</tr>
<tr>
<td><strong>Semantic layer</strong></td>
<td>dbt metrics or Cube</td>
<td>Single source of truth for metric definitions</td>
</tr>
<tr>
<td><strong>Catalog</strong></td>
<td>DataHub or Atlan</td>
<td>Discovery; lineage; tribal knowledge captured</td>
</tr>
<tr>
<td><strong>Observability</strong></td>
<td>Monte Carlo or Elementary</td>
<td>Know when data breaks before your stakeholders do</td>
</tr>
</tbody>
</table>
<p><strong>Governance:</strong> Formal data owners. Published SLAs. Access controls.</p>
<p><strong>Monthly cost:</strong> $10,000–30,000</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="20" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="large-org-stack-n-to-scale">Large Org Stack (N to Scale)</h2>
<p><strong>Goal:</strong> Domain autonomy, ML at scale, regulatory compliance.</p>
<p>Add to the medium stack:</p>
<table>
<thead>
<tr>
<th>Layer</th>
<th>Addition</th>
<th>Why now</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Architecture</strong></td>
<td>Data mesh / domain ownership</td>
<td>Each business domain owns its data products; central team sets standards</td>
</tr>
<tr>
<td><strong>ML platform</strong></td>
<td>MLflow, SageMaker, or Vertex</td>
<td>Model training, versioning, deployment</td>
</tr>
<tr>
<td><strong>Feature store</strong></td>
<td>Feast or Tecton</td>
<td>Shared features across models</td>
</tr>
<tr>
<td><strong>Model governance</strong></td>
<td>Model cards, bias audits, monitoring</td>
<td>Regulatory and ethical requirements</td>
</tr>
<tr>
<td><strong>Cost management</strong></td>
<td>Kubecost, cloud billing dashboards</td>
<td>$100K+/mo demands accountability</td>
</tr>
</tbody>
</table>
<p><strong>Monthly cost:</strong> $100,000+</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="21" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="the-migration-trap">The Migration Trap</h2>
<p>What happens when you outgrow your stack:</p>
<ol>
<li><strong>Spreadsheets to a real warehouse</strong> — Painful but straightforward. Budget 2–3 months.</li>
<li><strong>Warehouse to warehouse</strong> — Every query, dashboard, and integration rebuilt. Budget 6–12 months.</li>
<li><strong>&quot;We built it ourselves and now we can't maintain it&quot;</strong> — The custom pipeline one engineer built, who then left. Nobody understands it.</li>
</ol>
<p><strong>Key insight:</strong> Plan for the <strong>next</strong> migration when choosing the current tool. Ask: &quot;How hard will it be to leave this vendor in 3 years?&quot;</p>
<p>Avoid proprietary lock-in where you can. Use standard SQL. Use standard file formats.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="22" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="the-rfp-process">The RFP Process</h2>
<p><strong>When to RFP:</strong> Spending &gt;$10K/year or handling PII.</p>
<p><strong>Steps:</strong></p>
<ol>
<li><strong>Define requirements</strong> — Must-have vs. Should-have vs. Nice-to-have</li>
<li><strong>Weight criteria</strong> — Not all requirements are equal</li>
<li><strong>Score vendors</strong> — Structured, not vibes-based</li>
<li><strong>Negotiate</strong> — Always negotiate. Always.</li>
<li><strong>Pilot</strong> — 2-4 week proof of concept before committing</li>
</ol>
<p><strong>Scoring dimensions:</strong> Functionality, Integration, Security, Cost, Support, Scalability</p>
<p><strong>Pro tip:</strong> Score as a team. Each evaluator scores independently, then discuss disagreements — the discussion reveals hidden assumptions.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="23" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="working-with-it--procurement">Working with IT &amp; Procurement</h2>
<p><strong>Speak their language:</strong></p>
<ul>
<li>Security posture, SOC 2 Type II, penetration testing</li>
<li>Data residency (EU data stays in EU — GDPR)</li>
<li>SSO / SAML integration (no separate passwords)</li>
<li>Audit logs (who accessed what, when)</li>
</ul>
<p><strong>Procurement realities:</strong></p>
<ul>
<li>Budget cycle alignment — miss the window, wait a year</li>
<li>Procurement takes <strong>2–6x longer</strong> than you think</li>
<li>Security review + legal review + finance approval = months</li>
</ul>
<p><strong>The golden rule:</strong> Involve IT early. Not as a blocker — as a partner.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="24" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="privacy--governance-basics">Privacy &amp; Governance Basics</h2>
<p><strong>GDPR essentials for analytics managers:</strong></p>
<table>
<thead>
<tr>
<th>Concept</th>
<th>What it means for you</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Lawful basis</strong></td>
<td>You need a legal reason to process personal data</td>
</tr>
<tr>
<td><strong>Data minimization</strong></td>
<td>Collect only what you need. &quot;We might need it someday&quot; is not a reason.</td>
</tr>
<tr>
<td><strong>Right to erasure</strong></td>
<td>Users can ask you to delete their data. Your pipeline must support this.</td>
</tr>
</tbody>
</table>
<p><strong>Data classification — know your tiers:</strong></p>
<ul>
<li><strong>Public</strong> — Can share openly (blog metrics, public benchmarks)</li>
<li><strong>Internal</strong> — Company-wide access (aggregate dashboards)</li>
<li><strong>Confidential</strong> — Need-to-know (user-level data, financial details)</li>
<li><strong>Restricted</strong> — Highest sensitivity (PII, health data, payment data)</li>
</ul>
<p><strong>Retention:</strong> Don't keep what you don't need. Set policies. Enforce them.</p>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-class="divider" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" class="divider" data-marpit-pagination="25" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--class:divider;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="activity-data-infra-one-pager">Activity: Data Infra One-Pager</h2>
<h2 id="30-minutes">30 Minutes</h2>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="26" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="activity-data-infra-one-pager-1">Activity: Data Infra One-Pager</h2>
<p><strong>Time: 30 minutes</strong> | Reference: <code>resources/data-infra-blueprint-template.md</code></p>
<p>For your case context, sketch a one-page <strong>&quot;Our Next 6 Months of Data Infrastructure&quot;</strong> plan.</p>
<p><strong>Your one-pager must include:</strong></p>
<ol>
<li><strong>Current state</strong> — What exists today? Gaps and pain points?</li>
<li><strong>Target architecture</strong> — Stack in 6 months, mapped to blueprint layers</li>
<li><strong>Key tools</strong> — Selection for each layer and rationale (use Build vs. Buy)</li>
<li><strong>Budget estimate</strong> — Monthly and annual costs</li>
<li><strong>Top risk</strong> — What could go wrong? What do you depend on?</li>
</ol>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="27" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="activity-data-infra-one-pager--tips">Activity: Data Infra One-Pager — Tips</h2>
<p><strong>Small org context:</strong> 3-4 tools, under $2K/month. Your one-pager should be simple.</p>
<p><strong>Medium org context:</strong> Focus on what you're adding to the small stack and why.</p>
<p><strong>Large org context:</strong> Focus on what's achievable in 6 months, not the 5-year vision.</p>
<p><strong>For everyone:</strong></p>
<ul>
<li>Refer back to the blueprint slide for the canonical layers</li>
<li>Use the cost estimates from the slides as a starting point</li>
<li>Think about what IT would push back on in your plan</li>
</ul>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="28" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="debrief">Debrief</h2>
<p><strong>From the room:</strong></p>
<ul>
<li>What surprised you about your case's infrastructure needs?</li>
<li>Where did the Build vs. Buy framework change your initial instinct?</li>
<li>What trade-offs did you make? What did you decide to skip?</li>
<li>How does your infrastructure plan connect to your roadmap and executive narrative?</li>
</ul>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-header="ECBS5256 – Managing Data Science Teams" data-footer="CEU Vienna | Day 2 – Block E" data-theme="l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww" lang="POSIX" data-marpit-pagination="29" style="--paginate:true;--header:ECBS5256 – Managing Data Science Teams;--footer:CEU Vienna | Day 2 – Block E;--theme:l7h4y5ijydnvlf3zb90hs8nal55hf3f1ss5jsn7w6ww;" data-marpit-pagination-total="31">
<header>ECBS5256 – Managing Data Science Teams</header>

<h2 id="debrief-1">Debrief</h2>
<p><strong>Key insight:</strong> The &quot;right&quot; stack depends on your constraints — team size, budget, timeline, regulatory environment. There is no universal answer. The framework is the answer.</p>
<p><strong>Portfolio connection:</strong></p>
<ul>
<li><strong>Data Infrastructure Blueprint</strong> — optional artifact, template at <code>resources/data-infra-blueprint-template.md</code></li>
<li><strong>RFP Scoring Matrix</strong> — optional artifact, template at <code>resources/rfp-scoring-matrix-template.md</code></li>
<li>Neither is required but both demonstrate additional depth in your portfolio</li>
</ul>
<footer>CEU Vienna | Day 2 – Block E</footer>
</section>
